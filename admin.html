<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pioneros — Panel de Reservas</title>
    <meta name="robots" content="noindex,nofollow" />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              copper: {
                DEFAULT: "#bf8e50",
                50: "#faf5ef",
                100: "#f5ead9",
                200: "#ead4b0",
                300: "#dbb87a",
                400: "#ce9d52",
                500: "#bf8e50",
                600: "#a67438",
                700: "#8a5b2c",
                800: "#714825",
                900: "#5e3b20",
              },
              "copper-text": "#bf8e50",
            },
            fontFamily: {
              sans: ["Figtree", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: Figtree, sans-serif;
      }

      .admin-input {
        background-color: #d3cbc1;
        border: 1px solid #bdb5ab;
        border-radius: 0.5rem;
        padding: 0.625rem 0.875rem;
        color: #1f1e1a;
        width: 100%;
        font-size: 0.875rem;
        outline: none;
        transition: box-shadow 0.15s;
      }
      .admin-input:focus {
        box-shadow: 0 0 0 2px #bf8e50;
      }

      .status-pending {
        background: #fef3c7;
        color: #92400e;
      }
      .status-confirmed {
        background: #d1fae5;
        color: #065f46;
      }
      .status-cancelled {
        background: #fee2e2;
        color: #991b1b;
      }

      .tbl-row:hover {
        background-color: #ece6de;
      }

      #toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        background: #1f1e1a;
        color: #fff;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      #toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body class="bg-surface min-h-screen">
    <!-- ── Login screen ─────────────────────────────────────────── -->
    <div
      id="login-screen"
      class="min-h-screen flex items-center justify-center p-4"
    >
      <div class="bg-card rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <div class="flex items-center gap-3 mb-6">
          <img
            src="images/Logo_pioneros_inline.svg"
            alt="Pioneros"
            class="h-40 w-auto"
          />
        </div>
        <h1 class="text-xl font-bold text-dark mb-1">Panel de Reservas</h1>
        <p class="text-sm text-gray-400 mb-6">
          Acceso solo para administradores
        </p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-dark mb-1"
              >Email</label
            >
            <input
              type="email"
              id="login-email"
              class="admin-input"
              placeholder="admin@pioneros.cl"
              autocomplete="email"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-dark mb-1"
              >Contraseña</label
            >
            <input
              type="password"
              id="login-password"
              class="admin-input"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>
        <p
          id="login-error"
          class="hidden mt-3 text-sm text-red-600 font-medium"
        ></p>
        <button
          id="login-btn"
          onclick="handleLogin()"
          class="mt-5 w-full copper-bg text-white py-3 rounded-full font-semibold hover:bg-opacity-90 transition-all duration-200"
        >
          Iniciar sesión
        </button>
      </div>
    </div>

    <!-- ── Admin panel (hidden until login) ──────────────────────── -->
    <div id="admin-panel" class="hidden">
      <!-- Topbar -->
      <header class="bg-nav border-b border-card shadow-sm sticky top-0 z-40">
        <div
          class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between"
        >
          <div class="flex items-center gap-3">
            <img
              src="images/Logo_pioneros_inline.svg"
              alt="Pioneros"
              class="h-8 w-auto"
            />
            <span class="text-sm font-semibold text-dark hidden sm:inline"
              >Panel de Reservas</span
            >
          </div>
          <div class="flex items-center gap-3">
            <span
              id="admin-email-badge"
              class="text-xs text-gray-400 hidden sm:inline"
            ></span>
            <button
              onclick="handleLogout()"
              class="text-sm text-gray-400 hover:text-dark transition-colors flex items-center gap-1"
            >
              <svg
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </header>

      <!-- Main -->
      <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats row -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
          <div class="bg-card rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-dark" id="stat-total">—</p>
            <p class="text-xs text-gray-400 mt-1">Total</p>
          </div>
          <div class="bg-card rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-dark" id="stat-pending">—</p>
            <p class="text-xs text-gray-400 mt-1">Pendientes</p>
          </div>
          <div class="bg-card rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-dark" id="stat-confirmed">—</p>
            <p class="text-xs text-gray-400 mt-1">Confirmadas</p>
          </div>
          <div class="bg-card rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-dark" id="stat-cancelled">—</p>
            <p class="text-xs text-gray-400 mt-1">Canceladas</p>
          </div>
        </div>

        <!-- Filters + Block slot -->
        <div class="flex flex-wrap gap-3 mb-6 items-end">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1"
              >Filtrar por fecha</label
            >
            <input
              type="date"
              id="filter-date"
              class="admin-input admin-input-auto"
              title="Filtrar por fecha"
              onchange="loadBookings()"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1"
              >Estado</label
            >
            <select
              id="filter-status"
              class="admin-input admin-input-auto"
              title="Filtrar por estado"
              onchange="loadBookings()"
            >
              <option value="">Todos</option>
              <option value="pending">Pendientes</option>
              <option value="confirmed">Confirmadas</option>
              <option value="cancelled">Canceladas</option>
            </select>
          </div>
          <button
            onclick="loadBookings()"
            class="copper-bg text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-opacity-90 transition-all"
          >
            Actualizar
          </button>
          <button
            onclick="openBlockModal()"
            class="bg-deep text-dark border border-card px-5 py-2 rounded-full text-sm font-medium hover:bg-card transition-all ml-auto"
          >
            + Bloquear Horario
          </button>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto rounded-xl shadow">
          <table class="w-full text-sm bg-card">
            <thead>
              <tr class="bg-deep text-left">
                <th class="px-4 py-3 font-semibold text-dark">Fecha</th>
                <th class="px-4 py-3 font-semibold text-dark">Hora</th>
                <th class="px-4 py-3 font-semibold text-dark">Cliente</th>
                <th
                  class="px-4 py-3 font-semibold text-dark hidden sm:table-cell"
                >
                  Vehículo
                </th>
                <th
                  class="px-4 py-3 font-semibold text-dark hidden md:table-cell"
                >
                  Servicio
                </th>
                <th class="px-4 py-3 font-semibold text-dark">Estado</th>
                <th class="px-4 py-3 font-semibold text-dark">Acciones</th>
              </tr>
            </thead>
            <tbody id="bookings-tbody">
              <tr>
                <td colspan="7" class="text-center py-10 text-gray-400">
                  Cargando reservas...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <p id="no-results" class="hidden text-center text-gray-400 py-8">
          No se encontraron reservas con los filtros aplicados.
        </p>
      </main>
    </div>

    <!-- ── Row detail modal ───────────────────────────────────────── -->
    <div
      id="detail-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
    >
      <div
        class="absolute inset-0 bg-black/50"
        onclick="closeDetailModal()"
      ></div>
      <div
        class="relative bg-surface rounded-2xl shadow-2xl w-full max-w-md p-6"
      >
        <h3 class="text-lg font-bold text-dark mb-4">Detalle de Reserva</h3>
        <div id="detail-body" class="space-y-3 text-sm mb-5"></div>
        <div class="flex gap-3">
          <button
            id="detail-confirm-btn"
            onclick="detailAction('confirmed')"
            class="flex-1 bg-emerald-600 text-white py-2 rounded-full font-medium hover:bg-opacity-90 transition-all"
          >
            Confirmar
          </button>
          <button
            id="detail-cancel-btn"
            onclick="detailAction('cancelled')"
            class="flex-1 bg-red-600 text-white py-2 rounded-full font-medium hover:bg-opacity-90 transition-all"
          >
            Cancelar
          </button>
          <button
            onclick="closeDetailModal()"
            class="flex-1 bg-deep text-dark py-2 rounded-full font-medium hover:bg-card transition-all"
          >
            Cerrar
          </button>
        </div>
      </div>
    </div>

    <!-- ── Block slot modal ───────────────────────────────────────── -->
    <div
      id="block-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
    >
      <div
        class="absolute inset-0 bg-black/50"
        onclick="closeBlockModal()"
      ></div>
      <div
        class="relative bg-surface rounded-2xl shadow-2xl w-full max-w-sm p-6"
      >
        <h3 class="text-lg font-bold text-dark mb-4">Bloquear Horario</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-dark mb-1"
              >Fecha</label
            >
            <input
              type="date"
              id="block-date"
              class="admin-input"
              title="Fecha a bloquear"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-dark mb-1"
              >Horario</label
            >
            <select
              id="block-slot"
              class="admin-input"
              title="Horario a bloquear"
            >
              <option value="">Seleccionar horario</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-dark mb-1"
              >Motivo (opcional)</label
            >
            <input
              type="text"
              id="block-reason"
              class="admin-input"
              placeholder="Ej: Día feriado, reunión, etc."
            />
          </div>
        </div>
        <p
          id="block-error"
          class="hidden mt-3 text-sm text-red-600 font-medium"
        ></p>
        <div class="flex gap-3 mt-5">
          <button
            onclick="handleBlockSlot()"
            class="flex-1 copper-bg text-white py-2 rounded-full font-semibold hover:bg-opacity-90 transition-all"
          >
            Bloquear
          </button>
          <button
            onclick="closeBlockModal()"
            class="flex-1 bg-deep text-dark py-2 rounded-full font-medium hover:bg-card transition-all"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
  </body>
</html>
